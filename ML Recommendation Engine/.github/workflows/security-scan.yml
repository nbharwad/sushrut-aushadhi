# ============================================================================
# Security Scanning Workflow
# Implements security audit as defined in implementation.md Section 6.7
#
# Checks:
# - Container vulnerability scanning (Trivy)
# - Dependency vulnerability scanning (Snyk)
# - Container image scanning
# ============================================================================

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2am
  workflow_dispatch:

env:
  TRIVY_VERSION: '0.49.1'
  SNYK_VERSION: '1.1204.0'

jobs:
  trivy-scan:
    name: Trivy Container Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-security-results@v2
        with:
          category: 'trivy'
          file: 'trivy-results.json'
          tool_name: 'Trivy'
        if: always()
      
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ env.TRIVY_VERSION }}
          restore-keys: |
            ${{ runner.os }}-trivy-
      
      - name: Display vulnerabilities
        run: |
          echo "=== Trivy Scan Results ==="
          cat trivy-results.json
        if: always()

  trivy-image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t recommendation-service:${{ github.sha }} .
      
      - name: Run Trivy scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'recommendation-service:${{ github.sha }}'
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      
      - name: Upload image scan results
        uses: github/codeql-action/upload-security-results@v2
        with:
          category: 'trivy-image'
          file: 'trivy-image-results.json'
        if: always()

  snyk-scan:
    name: Snyk Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/v${{ env.SNYK_VERSION }}/snyk-linux -o snyk
          chmod +x ./snyk
          mv ./snyk /usr/local/bin/snyk
      
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_AUTH_TOKEN }}
        env:
          SNYK_AUTH_TOKEN: ${{ secrets.SNYK_AUTH_TOKEN }}
        continue-on-error: true
      
      - name: Run Snyk test
        run: |
          snyk test \
            --json-file-output=snyk-results.json \
            --severity-threshold=high \
            --fail-on=all
        continue-on-error: true
      
      - name: Upload Snyk results
        uses: github/codeql-action/upload-security-results@v2
        with:
          category: 'snyk'
          file: 'snyk-results.json'
          tool_name: 'Snyk'
        if: always()
      
      - name: Display Snyk results
        run: |
          echo "=== Snyk Scan Results ==="
          cat snyk-results.json || echo "No results file"
        if: always()

  snyk-monitor:
    name: Snyk Monitor (Continuous)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/v${{ env.SNYK_VERSION }}/snyk-linux -o snyk
          chmod +x ./snyk
          mv ./snyk /usr/local/bin/snyk
      
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_AUTH_TOKEN }}
        env:
          SNYK_AUTH_TOKEN: ${{ secrets.SNYK_AUTH_TOKEN }}
        continue-on-error: true
      
      - name: Monitor project in Snyk
        run: snyk monitor --json-file-output=snyk-monitor.json
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for known vulnerable dependencies
        run: |
          echo "=== Python Dependency Check ==="
          pip install safety || true
          safety check --json || true
          
          echo "=== npm Audit ==="
          npm audit --audit-level=high || true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, snyk-scan, dependency-check]
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan completed at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security scans have completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
          
          echo "### Scans Performed" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: Container and filesystem vulnerability scanning" >> $GITHUB_STEP_SUMMARY
          echo "- Snyk: Dependency vulnerability scanning" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: Python and npm audit" >> $GITHUB_STEP_SUMMARY