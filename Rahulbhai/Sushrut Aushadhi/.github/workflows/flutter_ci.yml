name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            sushrut_aushadhi/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/sushrut_aushadhi/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: cd sushrut_aushadhi && flutter pub get

      - name: Check formatting
        run: cd sushrut_aushadhi && dart format --set-exit-if-changed .

      - name: Analyze code
        run: cd sushrut_aushadhi && flutter analyze --fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            sushrut_aushadhi/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/sushrut_aushadhi/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: cd sushrut_aushadhi && flutter pub get

      - name: Run tests with coverage
        run: cd sushrut_aushadhi && flutter test --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: sushrut_aushadhi/coverage/

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            sushrut_aushadhi/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/sushrut_aushadhi/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > sushrut_aushadhi/android/app/sushrut_aushadhi.jks

      - name: Create key.properties
        run: |
          cat > sushrut_aushadhi/android/key.properties << EOF
          storeFile=sushrut_aushadhi.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Install dependencies
        run: cd sushrut_aushadhi && flutter pub get

      - name: Build App Bundle
        run: cd sushrut_aushadhi && flutter build appbundle --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: sushrut_aushadhi/build/app/outputs/bundle/release/app-release.aab

  deploy-rules:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sushrut_aushadhi/functions/package-lock.json

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            sushrut_aushadhi/functions/node_modules
          key: ${{ runner.os }}-nodes-${{ hashFiles('sushrut_aushadhi/functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nodes-

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore and Storage rules
        run: cd sushrut_aushadhi && firebase deploy --only firestore:rules,storage:rules --project sushrut-aushadhi --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Cloud Functions
        run: cd sushrut_aushadhi/functions && npm install && cd .. && firebase deploy --only functions --project sushrut-aushadhi --token "${{ secrets.FIREBASE_TOKEN }}"
