name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            sushrut_aushadhi/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/sushrut_aushadhi/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: cd sushrut_aushadhi && flutter pub get

      - name: Analyze code
        run: cd sushrut_aushadhi && flutter analyze

      - name: Run tests
        run: cd sushrut_aushadhi && flutter test

      - name: Clean build
        run: cd sushrut_aushadhi && flutter clean

      - name: Build App Bundle
        run: cd sushrut_aushadhi && flutter build appbundle --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: sushrut_aushadhi/build/app/outputs/bundle/release/app-release.aab
